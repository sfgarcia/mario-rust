<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column;
           align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
    canvas { display: block; image-rendering: pixelated; border: 2px solid #444; }
    #info { color: #888; margin-top: 10px; font-size: 13px; }
    #game-wrapper { position: relative; display: inline-block; line-height: 0; }
    #touch-overlay {
      display: none; position: absolute; inset: 0; pointer-events: none;
    }
    @media (pointer: coarse) { #touch-overlay { display: block; } }
    #joystick-zone {
      position: absolute; bottom: 18px; left: 18px;
      width: 110px; height: 110px; pointer-events: all;
      touch-action: none;
    }
    #joystick-base {
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.28);
      position: absolute;
    }
    #joystick-knob {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.38); border: 2px solid rgba(255,255,255,0.55);
      position: absolute; top: 32px; left: 32px;
    }
    #btn-jump {
      position: absolute; bottom: 22px; right: 22px;
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(80,200,120,0.20); border: 2px solid rgba(80,200,120,0.50);
      color: #fff; font-size: 22px; font-family: monospace;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all; user-select: none; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-restart-touch {
      position: absolute; top: 10px; right: 10px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25);
      color: #aaa; font-size: 13px; font-family: monospace;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all; user-select: none; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

<script>
  (function () {
    function fireKey(type, key) {
      window.dispatchEvent(new KeyboardEvent(type, { key: key, bubbles: true }));
    }

    // ── Estado del joystick ───────────────────────────────────────────────
    var jActive = false;
    var jOriginX = 0;
    var jLeft = false;
    var jRight = false;
    var DEADZONE = 18;
    var RADIUS   = 38; // max desplazamiento del knob

    var knob = document.getElementById('joystick-knob');
    var zone = document.getElementById('joystick-zone');
    var base = document.getElementById('joystick-base');
    var baseR = 55; // radio de la base (110/2)

    function setKey(key, active) {
      if (key === 'ArrowLeft') {
        if (active !== jLeft) { fireKey(active ? 'keydown' : 'keyup', 'ArrowLeft'); jLeft = active; }
      } else {
        if (active !== jRight) { fireKey(active ? 'keydown' : 'keyup', 'ArrowRight'); jRight = active; }
      }
    }

    function moveKnob(dx) {
      var clamped = Math.max(-RADIUS, Math.min(RADIUS, dx));
      knob.style.transform = 'translate(' + clamped + 'px, 0)';
    }

    zone.addEventListener('touchstart', function (e) {
      e.preventDefault();
      jActive = true;
      jOriginX = e.touches[0].clientX;
      moveKnob(0);
    }, { passive: false });

    zone.addEventListener('touchmove', function (e) {
      e.preventDefault();
      if (!jActive) return;
      var dx = e.touches[0].clientX - jOriginX;
      moveKnob(dx);
      setKey('ArrowLeft',  dx < -DEADZONE);
      setKey('ArrowRight', dx >  DEADZONE);
    }, { passive: false });

    function joystickEnd(e) {
      e.preventDefault();
      jActive = false;
      moveKnob(0);
      setKey('ArrowLeft',  false);
      setKey('ArrowRight', false);
    }
    zone.addEventListener('touchend',    joystickEnd, { passive: false });
    zone.addEventListener('touchcancel', joystickEnd, { passive: false });

    // ── Botón salto ───────────────────────────────────────────────────────
    var btnJump = document.getElementById('btn-jump');
    btnJump.addEventListener('touchstart', function (e) {
      e.preventDefault(); fireKey('keydown', 'ArrowUp');
    }, { passive: false });
    btnJump.addEventListener('touchend', function (e) {
      e.preventDefault(); fireKey('keyup', 'ArrowUp');
    }, { passive: false });
    btnJump.addEventListener('touchcancel', function (e) {
      e.preventDefault(); fireKey('keyup', 'ArrowUp');
    }, { passive: false });

    // ── Botón restart ─────────────────────────────────────────────────────
    var btnR = document.getElementById('btn-restart-touch');
    btnR.addEventListener('touchstart', function (e) {
      e.preventDefault(); fireKey('keydown', 'r');
    }, { passive: false });
    btnR.addEventListener('touchend', function (e) {
      e.preventDefault(); fireKey('keyup', 'r');
    }, { passive: false });
  })();
</script>
